      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Start Expo web in background
        working-directory: frontend
        run: |
          nohup yarn expo start --web --port 3000 \
            > expo.log 2>&1 &
          echo "Expo PID: $!"

      - name: Wait for Expo web
        run: |
          for i in {1..60}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || true)
            if [ "$code" = "200" ]; then
              echo "Expo web is up"; exit 0
            fi
            echo "  attempt $i: HTTP $code, retrying..."
            sleep 5
          done
          echo "::error::Expo web never returned 200 from /"
          tail -200 frontend/expo.log || true
          exit 1

      - name: Install Playwright deps
        working-directory: tests
        run: |
          npm ci || npm install --no-package-lock
          npx playwright install --with-deps chromium

      - name: Run Playwright FULL suite (advisory)
        working-directory: tests
        env:
          PRAYERS_LOFT_URL: http://localhost:3000
        run: npx playwright test

      - name: Upload Playwright HTML report (full)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full
          path: tests/playwright-report
          retention-days: 14

      - name: Upload backend log (full)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log-full
          path: backend/backend.log
          retention-days: 14
          if-no-files-found: ignore

