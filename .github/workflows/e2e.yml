# =============================================================================
# Prayers Loft — End-to-End test pipeline.
#
# Two jobs run independently:
#
#   1. smoke (REQUIRED, fast)
#      - Runs the curated `00-smoke-ci.spec.ts` set on every push and PR.
#      - Designed to finish in well under 15 minutes wall-clock and gate the
#        PR merge button.
#      - Parallel-safe (workers=3) and free of LLM-bound assertions.
#
#   2. full  (NON-BLOCKING, advisory)
#      - Runs the entire legacy Playwright suite (01-18 spec files) on push
#        to main, on a nightly schedule, and on workflow_dispatch.
#      - Marked continue-on-error so a failure does not block PR merges
#        while the legacy specs are being repaired post nav-refactor
#        (Reflections-tab → Bible-Assistant-tab). See test_result.md for
#        the deferred backlog.
#
# Why this exists
# ---------------
# v1.0.0 build 5 shipped to TestFlight with a silent API failure regression
# that a CI-gated test run would have caught instantly. Manual local testing
# is not a substitute for CI. Every push, every PR, every time.
# =============================================================================

name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly run of the full suite at 09:00 UTC.
    - cron: "0 9 * * *"
  workflow_dispatch:

# Cancel superseded runs on the same branch to save minutes.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # smoke — REQUIRED gate. Fast, parallel-safe, post-refactor stable.
  # ---------------------------------------------------------------------------
  smoke:
    name: Playwright smoke (mobile-chrome)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' | grep 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: prayers_loft_ci_smoke
      EMERGENT_LLM_KEY: ${{ secrets.EMERGENT_LLM_KEY }}
      JWT_SECRET: ci-test-jwt-secret-do-not-use-in-production
      JWT_ISSUER: prayers-loft-ci
      JWT_AUDIENCE: prayers-loft-app
      APPLE_SIGN_IN_ENABLED: "false"
      APPLE_TEST_MODE: "true"
      APPLE_SERVICES_ID: ""
      RESEND_API_KEY: ""
      RESEND_FROM: "ci@example.com"
      APP_PUBLIC_URL: "http://localhost:3000"
      EXPO_PUBLIC_BACKEND_URL: http://localhost:8001
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ \
            -r backend/requirements.txt

      - name: Wait for MongoDB
        run: |
          for i in {1..30}; do
            if (echo "ping" > /dev/tcp/localhost/27017) 2>/dev/null; then
              echo "MongoDB is up"; exit 0
            fi
            sleep 1
          done
          echo "MongoDB did not become ready in 30s"; exit 1

      - name: Start backend (uvicorn) in background
        working-directory: backend
        run: |
          set +x
          {
            printf 'MONGO_URL=%s\n' "$MONGO_URL"
            printf 'DB_NAME=%s\n' "$DB_NAME"
            printf 'EMERGENT_LLM_KEY=%s\n' "$EMERGENT_LLM_KEY"
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
            printf 'JWT_ISSUER=%s\n' "$JWT_ISSUER"
            printf 'JWT_AUDIENCE=%s\n' "$JWT_AUDIENCE"
            printf 'APPLE_SIGN_IN_ENABLED=%s\n' "$APPLE_SIGN_IN_ENABLED"
            printf 'APPLE_TEST_MODE=%s\n' "$APPLE_TEST_MODE"
            printf 'APPLE_SERVICES_ID=%s\n' "$APPLE_SERVICES_ID"
            printf 'RESEND_API_KEY=%s\n' "$RESEND_API_KEY"
            printf 'RESEND_FROM=%s\n' "$RESEND_FROM"
            printf 'APP_PUBLIC_URL=%s\n' "$APP_PUBLIC_URL"
          } > .env
          if [ -z "$EMERGENT_LLM_KEY" ]; then
            echo "::warning::EMERGENT_LLM_KEY is empty; LLM-dependent tests will fail."
          fi
          nohup python -m uvicorn server:app --host 0.0.0.0 --port 8001 \
            > backend.log 2>&1 &
          echo "Backend PID: $!"

      - name: Wait for backend /api/ to return 200
        run: |
          for i in {1..40}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/api/ || true)
            if [ "$code" = "200" ]; then
              echo "Backend is up"; exit 0
            fi
            echo "  attempt $i: HTTP $code, retrying..."
            sleep 2
          done
          echo "::error::Backend never returned 200 from /api/"
          tail -100 backend/backend.log || true
          exit 1

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Start Expo web in background
        working-directory: frontend
        run: |
          nohup yarn expo start --web --port 3000 \
            > expo.log 2>&1 &
          echo "Expo PID: $!"

      - name: Wait for Expo web to bundle and serve
        run: |
          for i in {1..60}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || true)
            if [ "$code" = "200" ]; then
              echo "Expo web is up"; exit 0
            fi
            echo "  attempt $i: HTTP $code, retrying..."
            sleep 5
          done
          echo "::error::Expo web never returned 200 from /"
          tail -200 frontend/expo.log || true
          exit 1

      - name: Install Playwright deps
        working-directory: tests
        run: |
          npm ci || npm install --no-package-lock
          npx playwright install --with-deps chromium

      - name: Run Playwright SMOKE suite
        working-directory: tests
        env:
          PRAYERS_LOFT_URL: http://localhost:3000
        # Only the curated smoke spec runs here. ~7 tests, parallel, no LLM.
        run: npx playwright test tests/00-smoke-ci.spec.ts

      - name: Upload Playwright HTML report (smoke)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: tests/playwright-report
          retention-days: 14

      - name: Upload backend log (smoke)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log-smoke
          path: backend/backend.log
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload expo log (smoke)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: expo-log-smoke
          path: frontend/expo.log
          retention-days: 14
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # full — NON-BLOCKING advisory job. Runs the entire legacy suite (01-18).
  # Skipped on PRs (to keep PR queues snappy). Runs on push/main, nightly,
  # and manual dispatch. Continues on error until the legacy specs are
  # repaired post-refactor.
  # ---------------------------------------------------------------------------
  full:
    name: Playwright full suite (mobile-chrome)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    continue-on-error: true
    needs: smoke
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' | grep 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: prayers_loft_ci_full
      EMERGENT_LLM_KEY: ${{ secrets.EMERGENT_LLM_KEY }}
      JWT_SECRET: ci-test-jwt-secret-do-not-use-in-production
      JWT_ISSUER: prayers-loft-ci
      JWT_AUDIENCE: prayers-loft-app
      APPLE_SIGN_IN_ENABLED: "false"
      APPLE_TEST_MODE: "true"
      APPLE_SERVICES_ID: ""
      RESEND_API_KEY: ""
      RESEND_FROM: "ci@example.com"
      APP_PUBLIC_URL: "http://localhost:3000"
      EXPO_PUBLIC_BACKEND_URL: http://localhost:8001
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ \
            -r backend/requirements.txt

      - name: Wait for MongoDB
        run: |
          for i in {1..30}; do
            if (echo "ping" > /dev/tcp/localhost/27017) 2>/dev/null; then
              echo "MongoDB is up"; exit 0
            fi
            sleep 1
          done
          echo "MongoDB did not become ready in 30s"; exit 1

      - name: Start backend (uvicorn) in background
        working-directory: backend
        run: |
          set +x
          {
            printf 'MONGO_URL=%s\n' "$MONGO_URL"
            printf 'DB_NAME=%s\n' "$DB_NAME"
            printf 'EMERGENT_LLM_KEY=%s\n' "$EMERGENT_LLM_KEY"
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
            printf 'JWT_ISSUER=%s\n' "$JWT_ISSUER"
            printf 'JWT_AUDIENCE=%s\n' "$JWT_AUDIENCE"
            printf 'APPLE_SIGN_IN_ENABLED=%s\n' "$APPLE_SIGN_IN_ENABLED"
            printf 'APPLE_TEST_MODE=%s\n' "$APPLE_TEST_MODE"
            printf 'APPLE_SERVICES_ID=%s\n' "$APPLE_SERVICES_ID"
            printf 'RESEND_API_KEY=%s\n' "$RESEND_API_KEY"
            printf 'RESEND_FROM=%s\n' "$RESEND_FROM"
            printf 'APP_PUBLIC_URL=%s\n' "$APP_PUBLIC_URL"
          } > .env
          nohup python -m uvicorn server:app --host 0.0.0.0 --port 8001 \
            > backend.log 2>&1 &
          echo "Backend PID: $!"

      - name: Wait for backend /api/ to return 200
        run: |
          for i in {1..40}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/api/ || true)
