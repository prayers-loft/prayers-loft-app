# =============================================================================
# Prayers Loft — End-to-End test pipeline.
#
# Runs the full Playwright E2E suite on every push and PR to main.
# Spins up:
#   1. MongoDB 7 (service container)
#   2. FastAPI backend (port 8001)
#   3. Expo web frontend in CI mode (port 3000)
# Then runs `playwright test` against the live local stack.
#
# Why this exists
# ---------------
# v1.0.0 build 5 shipped to TestFlight with a silent API failure regression
# that a CI-gated test run would have caught instantly. Manual local testing
# is not a substitute for CI. Every push, every PR, every time.
# =============================================================================

name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch to save minutes.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (mobile-chrome)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # MongoDB service — runs alongside the job container, reachable on localhost.
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' | grep 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # ---- Backend env (mirrors backend/.env contract) ---------------------
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: prayers_loft_ci
      EMERGENT_LLM_KEY: ${{ secrets.EMERGENT_LLM_KEY }}
      JWT_SECRET: ci-test-jwt-secret-do-not-use-in-production
      JWT_ISSUER: prayers-loft-ci
      JWT_AUDIENCE: prayers-loft-app
      APPLE_SIGN_IN_ENABLED: "false"
      APPLE_TEST_MODE: "true"
      APPLE_SERVICES_ID: ""
      RESEND_API_KEY: ""
      RESEND_FROM: "ci@example.com"
      APP_PUBLIC_URL: "http://localhost:3000"

      # ---- Frontend env (Metro inlines EXPO_PUBLIC_* at bundle time) -------
      EXPO_PUBLIC_BACKEND_URL: http://localhost:8001
      CI: "true"

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- Python / backend setup ------------------------------------
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Wait for MongoDB to be ready
        run: |
          for i in {1..30}; do
            if (echo "ping" > /dev/tcp/localhost/27017) 2>/dev/null; then
              echo "MongoDB is up"; exit 0
            fi
            sleep 1
          done
          echo "MongoDB did not become ready in 30s"; exit 1

      - name: Start backend (uvicorn) in background
        working-directory: backend
        run: |
          # SECURITY: explicitly disable command tracing so any future shell
          # debug flag cannot echo expanded secret values to the workflow log.
          # GitHub Actions also auto-masks any value sourced from secrets.*,
          # but defense in depth.
          set +x

          # Construct .env from job-level env vars (each value sourced from
          # the env: block above; secret values come from ${{ secrets.* }}).
          # Use one redirect block; no echo of expanded values.
          {
            printf 'MONGO_URL=%s\n' "$MONGO_URL"
            printf 'DB_NAME=%s\n' "$DB_NAME"
            printf 'EMERGENT_LLM_KEY=%s\n' "$EMERGENT_LLM_KEY"
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
            printf 'JWT_ISSUER=%s\n' "$JWT_ISSUER"
            printf 'JWT_AUDIENCE=%s\n' "$JWT_AUDIENCE"
            printf 'APPLE_SIGN_IN_ENABLED=%s\n' "$APPLE_SIGN_IN_ENABLED"
            printf 'APPLE_TEST_MODE=%s\n' "$APPLE_TEST_MODE"
            printf 'APPLE_SERVICES_ID=%s\n' "$APPLE_SERVICES_ID"
            printf 'RESEND_API_KEY=%s\n' "$RESEND_API_KEY"
            printf 'RESEND_FROM=%s\n' "$RESEND_FROM"
            printf 'APP_PUBLIC_URL=%s\n' "$APP_PUBLIC_URL"
          } > .env

          # Audit: confirm file was written without revealing contents.
          # Print only line count and byte count.
          lines=$(wc -l < .env)
          bytes=$(wc -c < .env)
          echo ".env written ($lines lines, $bytes bytes)"

          # Sanity: required key is non-empty (without revealing length).
          if [ -z "$EMERGENT_LLM_KEY" ]; then
            echo "::warning::EMERGENT_LLM_KEY is empty; LLM-dependent tests will fail."
          else
            echo "EMERGENT_LLM_KEY: present"
          fi

          nohup python -m uvicorn server:app --host 0.0.0.0 --port 8001 \
            > backend.log 2>&1 &
          echo "Backend PID: $!"

      - name: Wait for backend /api/ to return 200
        run: |
          for i in {1..40}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/api/ || true)
            if [ "$code" = "200" ]; then
              echo "Backend is up"; exit 0
            fi
            echo "  attempt $i: HTTP $code, retrying..."
            sleep 2
          done
          echo "::error::Backend never returned 200 from /api/"
          tail -100 backend/backend.log || true
          exit 1

      # ---------- Node / frontend setup -------------------------------------
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Start Expo web in background
        working-directory: frontend
        run: |
          nohup yarn expo start --web --port 3000 \
            > expo.log 2>&1 &
          echo "Expo PID: $!"

      - name: Wait for Expo web to bundle and serve
        run: |
          # First bundle can take ~60s; allow up to 5 min.
          for i in {1..60}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || true)
            if [ "$code" = "200" ]; then
              echo "Expo web is up"; exit 0
            fi
            echo "  attempt $i: HTTP $code, retrying..."
            sleep 5
          done
          echo "::error::Expo web never returned 200 from /"
          tail -200 frontend/expo.log || true
          exit 1

      # ---------- Playwright ------------------------------------------------
      - name: Install Playwright deps
        working-directory: tests
        run: |
          npm ci || npm install --no-package-lock
          npx playwright install --with-deps chromium

      - name: Run Playwright suite
        working-directory: tests
        env:
          PRAYERS_LOFT_URL: http://localhost:3000
        run: npx playwright test

      # ---------- Artifacts (on failure) ------------------------------------
      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report
          retention-days: 14

      - name: Upload backend log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend/backend.log
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload expo log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: expo-log
          path: frontend/expo.log
          retention-days: 14
          if-no-files-found: ignore
