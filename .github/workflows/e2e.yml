            sleep 2
          done
          echo "::error::Backend never returned 200 from /api/"
          tail -100 backend/backend.log || true
          exit 1

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn
